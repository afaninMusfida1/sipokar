<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Kelola Fasilitas</title>
  </head>
  <body>
    <div
      th:replace="~{fragments/admin-layout :: layout('Kelola Fasilitas', ~{::section})}"
    >
      <section>
        <div
          class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8 w-full xl:w-full"
        >
          <h2 class="text-base font-semibold text-gray-900 mb-4">
            Tambah Fasilitas Baru
          </h2>
          <form
            th:action="@{/admin/fasilitas}"
            th:object="${fasilitas}"
            method="post"
            enctype="multipart/form-data"
            class="flex flex-col gap-4"
          >
            <div class="flex flex-col sm:flex-row gap-4">
              <input
                type="text"
                th:field="*{nama}"
                required
                placeholder="Nama fasilitas (Contoh: Boardwalk Mangrove)"
                class="flex-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm"
              />

              <input
                type="text"
                th:field="*{infoTambahan}"
                placeholder="Info Tambahan (Contoh: Panjang 500 meter)"
                class="flex-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm"
              />
            </div>

            <textarea
              th:field="*{deskripsi}"
              required
              placeholder="Tuliskan deskripsi lengkap fasilitas di sini..."
              rows="3"
              class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm resize-none"
            ></textarea>

            <div
              class="flex flex-col sm:flex-row gap-4 items-center justify-between border-t border-gray-100 pt-4"
            >
              <input
                type="file"
                name="file"
                accept="image/*"
                required
                class="w-full sm:w-auto p-2 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-gray-900 file:text-white file:text-xs"
              />

              <button
                type="submit"
                class="w-full sm:w-auto bg-gray-900 text-white px-8 py-2.5 rounded-xl text-sm font-semibold hover:bg-green-600 transition-all"
              >
                Tambah Fasilitas
              </button>
            </div>
          </form>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div
            th:each="f : ${daftarFasilitas}"
            class="group bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex flex-col justify-between hover:shadow-md transition-all duration-300 relative"
          >
            <div class="flex justify-between items-start mb-4">
              <div
                class="w-16 h-16 bg-gray-50 rounded-xl overflow-hidden flex items-center justify-center shrink-0"
              >
                <img
                  th:if="${f.foto != null and #strings.startsWith(f.foto, 'http')}"
                  th:src="${f.foto}"
                  class="w-full h-full object-cover"
                  alt="foto fasilitas"
                />

                <img
                  th:if="${f.foto != null and !#strings.startsWith(f.foto, 'http')}"
                  th:src="@{'/uploads/fasilitas/' + ${f.foto}}"
                  class="w-full h-full object-cover"
                  alt="foto fasilitas"
                />

                <span th:if="${f.foto == null}" class="text-2xl">🏷️</span>
              </div>

              <form
                th:action="@{/admin/fasilitas/{id}/hapus(id=${f.id})}"
                method="post"
                th:id="'deleteForm' + ${f.id}"
              >
                <button
                  type="button"
                  th:onclick="'confirmDelete(' + ${f.id} + ')'"
                  class="inline-flex items-center gap-1.5 text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 px-2.5 py-1.5 rounded-lg transition-colors text-xs font-medium"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                  <span>Hapus</span>
                </button>
              </form>
            </div>

            <div class="flex-1">
              <h3
                class="text-base font-bold text-gray-900 mb-1"
                th:text="${f.nama}"
              >
                Nama Fasilitas
              </h3>
              <p
                class="text-xs text-gray-500 line-clamp-3 mb-3 leading-relaxed"
                th:text="${f.deskripsi}"
              >
                Deskripsi fasilitas...
              </p>

              <div
                th:if="${f.infoTambahan != null and !f.infoTambahan.isEmpty()}"
                class="inline-flex items-center gap-1.5 bg-green-50 text-green-700 text-xs font-medium px-2 py-1 rounded-md"
              >
                <svg
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                  ></path>
                </svg>
                <span th:text="${f.infoTambahan}">Info Tambahan</span>
              </div>
            </div>
          </div>

          <div
            th:if="${#lists.isEmpty(daftarFasilitas)}"
            class="col-span-full py-12 text-center border-2 border-dashed border-gray-200 rounded-2xl"
          >
            <p class="text-gray-400 text-sm">
              Belum ada fasilitas yang ditambahkan.
            </p>
          </div>
        </div>

        <script>
          function confirmDelete(id) {
            Swal.fire({
              title: "Hapus fasilitas?",
              text: "Data yang dihapus tidak dapat dikembalikan!",
              icon: "warning",
              showCancelButton: true,
              confirmButtonColor: "#ef4444",
              cancelButtonColor: "#6b7280",
              confirmButtonText: "Ya, hapus!",
              cancelButtonText: "Batal",
            }).then((result) => {
              if (result.isConfirmed) {
                document.getElementById("deleteForm" + id).submit();
              }
            });
          }
        </script>
      </section>
    </div>
  </body>
</html>
