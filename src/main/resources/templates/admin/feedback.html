<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cek Feedback</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Cek Feedback', ~{::section})}">
    <section>
        <!-- Menggunakan space-y-6 agar jarak antar card konsisten dengan spacing (gap-6) di dashboard -->
        <div class="space-y-6">
            
            <div th:each="fb : ${daftarFeedback}" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                
                <!-- Header Feedback -->
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="font-semibold text-gray-900 text-lg" th:text="${fb.nama}">Nama</p>
                        <p th:if="${fb.email != null}" class="text-sm text-gray-500 font-medium mb-1 flex items-center gap-1.5">
                            <i class="fas fa-envelope text-gray-400"></i> <span th:text="${fb.email}">email@contoh.com</span>
                        </p>
                        <p class="text-xs text-gray-400 mt-1" th:text="${#temporals.format(fb.createdAt, 'dd MMM yyyy HH:mm')}">tanggal</p>
                    </div>
                    <!-- Badge disesuaikan dengan warna soft seperti pada tabel dashboard -->
                    <span th:if="${fb.sudahDitindaklanjuti}" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200">Ditindaklanjuti</span>
                    <span th:unless="${fb.sudahDitindaklanjuti}" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-yellow-50 text-yellow-700 border border-yellow-200">Belum diproses</span>
                </div>
                
                <!-- Isi Feedback dengan bg-gray-50/50 agar selaras dengan header tabel dashboard -->
                <div class="bg-gray-50/50 border border-gray-200 p-4 rounded-xl mb-6">
                    <p class="text-sm text-gray-700 leading-relaxed" th:text="${fb.isi}">Isi feedback</p>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <a th:if="${fb.email != null}" 
                       th:href="'mailto:' + ${fb.email} + '?subject=Respon%20Feedback%20Sipokar&body=Halo%20' + ${fb.nama} + ',%0D%0A%0D%0ATerima%20kasih%20atas%20masukan%20Anda:%20%22' + ${fb.isi} + '%22.%0D%0A%0D%0A[Tulis%20balasan%20Anda%20di%20sini...]'" 
                       target="_blank"
                       class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center gap-2 shadow-sm w-full sm:w-auto justify-center">
                        <i class="fas fa-reply"></i> Balas ke Email
                    </a>
                    
                    <span th:if="${fb.email == null}" class="px-5 py-2.5 bg-gray-50 text-gray-500 rounded-lg text-sm font-medium flex items-center gap-2 cursor-not-allowed border border-gray-200 w-full sm:w-auto justify-center">
                        <i class="fas fa-envelope-xmark"></i> Tidak ada email
                    </span>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(daftarFeedback)}" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center text-gray-500 font-medium">
                Belum ada feedback masuk.
            </div>
            
        </div>
    </section>
</div>
</body>

</html>
