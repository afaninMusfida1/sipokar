<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Notifications</title>
  </head>

  <body>
    <div
      th:replace="~{fragments/admin-layout :: layout('Notifications', ~{::section})}"
    >
      <section>
        <div class="space-y-6">
          <!-- Header Action -->
          <div class="flex items-center justify-between">
            <div>
              <h2 class="text-2xl font-bold text-gray-900">Semua Notifikasi</h2>
              <p class="text-gray-500 mt-1">
                Pantau agenda dan aktivitas terbaru.
              </p>
            </div>

            <form th:action="@{/admin/notifications/read-all}" method="post">
              <button
                type="submit"
                class="px-4 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700 transition font-medium"
              >
                Tandai Semua Dibaca
              </button>
            </form>
          </div>

          <!-- Empty State -->
          <div
            th:if="${#lists.isEmpty(notifications)}"
            class="bg-white rounded-2xl border border-gray-200 p-12 text-center shadow-sm"
          >
            <div
              class="w-20 h-20 mx-auto rounded-full bg-gray-100 flex items-center justify-center mb-4 text-3xl"
            >
              🔔
            </div>

            <h3 class="text-lg font-semibold text-gray-800">
              Belum ada notifikasi
            </h3>

            <p class="text-gray-500 mt-2">
              Semua pemberitahuan agenda akan muncul di sini.
            </p>
          </div>

          <!-- Notification List -->
          <div class="space-y-4">
            <div
              th:each="notif : ${notifications}"
              class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition-all duration-200 p-5"
            >
              <div class="flex items-start justify-between gap-4">
                <!-- Left -->
                <div class="flex gap-4 flex-1">
                  <!-- Status Indicator -->
                  <div class="pt-2">
                    <div
                      th:classappend="${notif.isRead} ? 'bg-gray-300' : 'bg-green-500 animate-pulse'"
                      class="w-3 h-3 rounded-full"
                    ></div>
                  </div>

                  <!-- Content -->
                  <div class="flex-1">
                    <div class="flex items-center gap-3 mb-2">
                      <p
                        th:text="${notif.message}"
                        class="font-semibold text-gray-900"
                      ></p>

                      <!-- Modern Badge -->
                      <span
                        th:if="${!notif.isRead}"
                        class="px-3 py-1 text-xs rounded-full bg-green-100 text-green-700 font-medium border border-green-200"
                      >
                        Belum Dibaca
                      </span>

                      <span
                        th:if="${notif.isRead}"
                        class="px-3 py-1 text-xs rounded-full bg-gray-100 text-gray-600 font-medium border border-gray-200"
                      >
                        Sudah Dibaca
                      </span>
                    </div>

                    <!-- Detail -->
                    <div class="space-y-1">
                      <p
                        class="text-sm text-gray-500"
                        th:text="'Diterima pada ' + ${#temporals.format(notif.createdAt, 'dd MMM yyyy')}"
                      ></p>

                      <p
                        class="text-sm text-gray-400"
                        th:text="'Jam ' + ${#temporals.format(notif.createdAt, 'HH:mm')}"
                      ></p>
                    </div>
                  </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-2">
                  <!-- Only unread can mark read -->
                  <form
                    th:if="${!notif.isRead}"
                    th:action="@{/admin/notifications/read/{id}(id=${notif.id})}"
                    method="post"
                  >
                    <button
                      type="submit"
                      class="px-4 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700 transition text-sm font-medium"
                    >
                      Tandai Dibaca
                    </button>
                  </form>

                  <!-- Only read can delete -->
                  <form
                    th:if="${notif.isRead}"
                    th:action="@{/admin/notifications/delete/{id}(id=${notif.id})}"
                    method="post"
                  >
                    <button
                      type="submit"
                      class="px-4 py-2 rounded-xl bg-red-50 text-red-600 hover:bg-red-100 transition text-sm font-medium"
                    >
                      Hapus
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
