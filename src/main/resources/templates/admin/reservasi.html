<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Kelola Reservasi</title>
  </head>

  <body>
    <div
      th:replace="~{fragments/admin-layout :: layout('Kelola Reservasi', ~{::section})}"
    >
      <section>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
          <!-- LEFT SIDE -->
          <div class="xl:col-span-2 space-y-8">
            <!-- FORM TEMPAT -->
            <div
              class="bg-white rounded-3xl border border-gray-200 p-8 shadow-sm"
            >
              <h2 class="text-2xl font-bold mb-2">Tempat Reservasi</h2>
              <p class="text-sm text-gray-500 mb-8">
                Tambah dan kelola tempat reservasi
              </p>

              <form
                id="tempatForm"
                th:action="@{/admin/reservasi/tempat}"
                th:object="${tempat}"
                method="post"
                enctype="multipart/form-data"
                class="space-y-5"
              >
                <input type="hidden" th:field="*{id}" />

                <div class="grid md:grid-cols-2 gap-4">
                  <input
                    th:field="*{nama}"
                    placeholder="Nama Tempat"
                    class="w-full p-4 rounded-2xl border border-gray-200"
                  />

                  <input
                    th:field="*{kapasitas}"
                    type="number"
                    placeholder="Kapasitas"
                    class="w-full p-4 rounded-2xl border border-gray-200"
                  />
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                  <!-- Upload -->
                  <label
                    for="tempatFotoField"
                    class="border-2 border-dashed border-green-400 rounded-3xl h-56 flex flex-col items-center justify-center cursor-pointer hover:bg-green-50 transition"
                  >
                    <div
                      class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mb-4"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="w-8 h-8 text-green-600"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12M8 8l4-4 4 4"
                        />
                      </svg>
                    </div>

                    <p class="font-semibold text-green-700 text-lg">
                      Upload foto tempat
                    </p>

                    <p class="text-sm text-gray-500 mt-2">
                      Click to browse atau drag & drop
                    </p>

                    <p class="text-xs text-gray-400 mt-1">
                      JPG, PNG, WEBP (Maks. 5MB)
                    </p>

                    <input
                      id="tempatFotoField"
                      type="file"
                      name="fotoFile"
                      accept="image/*"
                      class="hidden"
                    />
                  </label>

                  <!-- Deskripsi -->
                  <textarea
                    th:field="*{deskripsi}"
                    rows="8"
                    placeholder="Deskripsi tempat"
                    class="w-full p-4 rounded-2xl border border-gray-200"
                  ></textarea>
                </div>

                <img
                  id="previewFoto"
                  class="hidden w-40 h-40 rounded-2xl object-cover shadow"
                />

                <button
                  class="bg-green-600 text-white px-6 py-3 rounded-2xl font-semibold"
                >
                  Tambah Tempat
                </button>
              </form>
            </div>

            <!-- LIST TEMPAT -->
            <div class="space-y-4">
              <div
                th:each="tempatItem : ${daftarTempat}"
                class="bg-white border rounded-3xl p-5 flex gap-5 items-center reservasi-card"
                th:data-id="${tempatItem.id}"
                th:data-nama="${tempatItem.nama}"
                th:data-kapasitas="${tempatItem.kapasitas}"
                th:data-deskripsi="${tempatItem.deskripsi}"
              >
                <img
                  th:src="${tempatItem.fotoUrl}"
                  class="w-32 h-24 rounded-2xl object-cover"
                />

                <div class="flex-1">
                  <h3
                    class="font-bold text-lg"
                    th:text="${tempatItem.nama}"
                  ></h3>

                  <p
                    class="text-gray-500 text-sm mt-1"
                    th:text="${tempatItem.deskripsi}"
                  ></p>

                  <span
                    class="inline-block mt-3 text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full"
                    th:text="${tempatItem.kapasitas} + ' orang'"
                  ></span>
                </div>

                <div class="flex gap-3">
                  <!-- Edit -->
                  <button
                    type="button"
                    onclick="editTempat(this)"
                    class="px-4 py-2 rounded-2xl border border-gray-200 hover:bg-gray-50 flex items-center gap-2"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="w-4 h-4"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 4H7a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-4"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"
                      />
                    </svg>
                    Edit
                  </button>

                  <!-- Hapus -->
                  <form
                    th:action="@{/admin/reservasi/tempat/{id}/hapus(id=${tempatItem.id})}"
                    method="post"
                  >
                    <button
                      class="px-4 py-2 rounded-2xl border border-red-200 text-red-600 hover:bg-red-50 flex items-center gap-2"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="w-4 h-4"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                        stroke-width="2"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M19 7L18.132 19.142A2 2 0 0116.138 21H7.862A2 2 0 015.868 19.142L5 7"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M10 11V17"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M14 11V17"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M4 7H20"
                        />
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M9 7V4A1 1 0 0110 3H14A1 1 0 0115 4V7"
                        />
                      </svg>
                      Hapus
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <!-- RIGHT SIDE -->
          <div class="space-y-8">
            <!-- FORM RESERVASI -->
            <div
              class="bg-white rounded-3xl border border-gray-200 p-6 shadow-sm"
            >
              <h2 class="text-xl font-bold mb-6">Daftar Reservasi</h2>

              <form
                th:action="@{/admin/reservasi/booking}"
                th:object="${reservasi}"
                method="post"
                class="space-y-4"
              >
                <input
                  th:field="*{namaPemesan}"
                  placeholder="Nama Pemesan"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                />

                <input
                  th:field="*{kontak}"
                  placeholder="Kontak"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                />

                <select
                  name="tempatId"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                >
                  <option value="">Pilih Tempat</option>
                  <option
                    th:each="tempatItem : ${daftarTempat}"
                    th:value="${tempatItem.id}"
                    th:text="${tempatItem.nama}"
                  ></option>
                </select>

                <input
                  th:field="*{tanggal}"
                  type="date"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                />

                <input
                  th:field="*{jumlahOrang}"
                  type="number"
                  placeholder="Jumlah Orang"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                />

                <textarea
                  th:field="*{catatan}"
                  rows="3"
                  placeholder="Catatan"
                  class="w-full p-4 rounded-2xl border border-gray-200"
                ></textarea>

                <button
                  class="w-full bg-green-600 text-white py-4 rounded-2xl font-semibold"
                >
                  Simpan Reservasi
                </button>
              </form>
            </div>

            <!-- LIST RESERVASI -->
            <div
              class="bg-white rounded-3xl border border-gray-200 p-6 shadow-sm"
            >
              <h3 class="font-bold mb-4">Daftar Reservasi</h3>

              <div
                th:each="booking : ${daftarReservasi}"
                class="border rounded-2xl p-4 mb-4"
              >
                <div class="flex justify-between items-start">
                  <div>
                    <p
                      class="font-semibold"
                      th:text="${booking.namaPemesan}"
                    ></p>
                    <p
                      class="text-sm text-gray-500"
                      th:text="${booking.kontak}"
                    ></p>
                    <p
                      class="text-sm mt-2"
                      th:text="${booking.tempat.nama}"
                    ></p>
                    <p
                      class="text-sm text-gray-500"
                      th:text="${#temporals.format(booking.tanggal, 'dd MMM yyyy')}"
                    ></p>
                  </div>

                  <div>
                    <form
                      th:action="@{/admin/reservasi/booking/{id}/hapus(id=${booking.id})}"
                      method="post"
                    >
                      <button
                        class="px-3 py-2 rounded-xl border border-red-200 text-red-600 hover:bg-red-50 text-sm flex items-center gap-2 transition"
                      >
                        <svg
                          xmlns="http://www.w3.org/2000/svg"
                          class="w-4 h-4"
                          fill="none"
                          viewBox="0 0 24 24"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M19 7L18.132 19.142A2 2 0 0116.138 21H7.862A2 2 0 015.868 19.142L5 7"
                          />
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M10 11V17"
                          />
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M14 11V17"
                          />
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M4 7H20"
                          />
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 7V4A1 1 0 0110 3H14A1 1 0 0115 4V7"
                          />
                        </svg>

                        Hapus
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <script>
          function editTempat(button) {
            const card = button.closest(".reservasi-card");

            document.querySelector('[name="id"]').value = card.dataset.id;
            document.querySelector('[name="nama"]').value = card.dataset.nama;
            document.querySelector('[name="kapasitas"]').value =
              card.dataset.kapasitas;
            document.querySelector('[name="deskripsi"]').value =
              card.dataset.deskripsi;

            document.getElementById("tempatForm").action =
              "/admin/reservasi/tempat/" + card.dataset.id + "/update";

            window.scrollTo({
              top: 0,
              behavior: "smooth",
            });
          }

          document
            .getElementById("tempatFotoField")
            .addEventListener("change", function (e) {
              const file = e.target.files[0];

              if (file) {
                const preview = document.getElementById("previewFoto");
                preview.src = URL.createObjectURL(file);
                preview.classList.remove("hidden");
              }
            });
        </script>
      </section>
    </div>
  </body>
</html>
