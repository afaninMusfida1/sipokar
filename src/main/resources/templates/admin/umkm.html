<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Kelola UMKM</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Kelola UMKM', ~{::section})}">
    <section>
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-8">
            
            <div class="px-6 py-5 border-b border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-gray-50/50">
                <h2 class="text-base font-semibold text-gray-900">Daftar Mitra UMKM</h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-white border-b border-gray-100 text-gray-500 font-medium">
                        <tr>
                            <th class="px-6 py-3 font-medium">Nama Usaha</th>
                            <th class="px-6 py-3 font-medium">Jenis Usaha</th>
                            <th class="px-6 py-3 font-medium">Pemilik</th>
                            <th class="px-6 py-3 font-medium">Telepon</th>
                            <th class="px-6 py-3 font-medium text-center">Status</th>
                            <th class="px-6 py-3 font-medium text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-gray-600">
                        <tr th:each="umkm : ${daftarUmkm}" class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-gray-900" th:text="${umkm.namaUsaha}">Nama Usaha</td>
                            <td class="px-6 py-4" th:text="${umkm.jenisUsaha}">Jenis</td>
                            <td class="px-6 py-4" th:text="${umkm.pemilik}">Pemilik</td>
                            <td class="px-6 py-4" th:text="${umkm.telepon}">Telepon</td>
                            <td class="px-6 py-4 text-center">
                                <span th:switch="${umkm.status}">
                                    <span th:case="'VERIFIED'" class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-100">
                                        Terverifikasi
                                    </span>
                                    <span th:case="'PENDING'" class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-medium bg-yellow-50 text-yellow-700 border border-yellow-100">
                                        Menunggu
                                    </span>
                                    <span th:case="'REJECTED'" class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-medium bg-red-50 text-red-700 border border-red-100">
                                        Ditolak
                                    </span>
                                </span>
                            </td>
                            <td class="px-6 py-4 text-center space-x-1 whitespace-nowrap">
                                <a th:href="@{/admin/umkm/{id}(id=${umkm.id})}" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 rounded-md hover:bg-blue-100 hover:text-blue-700 transition-colors">
                                    Detail
                                </a>
                                
                                <form th:if="${umkm.status.name() != 'VERIFIED'}" th:action="@{/admin/umkm/{id}/verifikasi(id=${umkm.id})}" method="post" class="inline-block" onsubmit="return confirm('Yakin ingin menyetujui UMKM ini?');">
                                    <button type="submit" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium text-green-600 bg-green-50 rounded-md hover:bg-green-100 hover:text-green-700 transition-colors">
                                        Setujui
                                    </button>
                                </form>
                                
                                <form th:if="${umkm.status.name() != 'REJECTED'}" th:action="@{/admin/umkm/{id}/tolak(id=${umkm.id})}" method="post" class="inline-block" onsubmit="return confirm('Yakin ingin menolak UMKM ini?');">
                                    <button type="submit" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-md hover:bg-red-100 hover:text-red-700 transition-colors">
                                        Tolak
                                    </button>
                                </form>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(daftarUmkm)}">
                            <td colspan="6" class="px-6 py-10 text-center text-gray-400">
                                Belum ada UMKM terdaftar saat ini.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </section>
</div>
</body>
</html>
