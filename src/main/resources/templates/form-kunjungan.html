<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Kunjungan | Pokdarwis Medokan Ayu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">

    <header class="bg-green-800 text-white py-8 px-4 text-center">
        <h1 class="text-2xl md:text-3xl font-heading font-bold">Form Kunjungan</h1>
        <p class="text-green-100 mt-2 text-sm md:text-base">Pokdarwis Medokan Ayu — Ekowisata Mangrove</p>
    </header>

    <main class="max-w-md mx-auto px-4 py-8">
        <div th:if="${param.success}" class="mb-6 bg-green-50 border border-green-200 text-green-700 p-4 rounded-xl flex items-center gap-2">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>Terima kasih! Kunjungan Anda telah tercatat.</span>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="text-lg font-heading font-bold text-gray-900 mb-1">Form Kunjungan</h2>
            <p class="text-sm text-gray-500 mb-6">Silakan isi data berikut untuk mencatat kunjungan Anda.</p>

            <form th:action="@{/form-kunjungan}" th:object="${pengunjung}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
                    <input type="text" th:field="*{nama}" required placeholder="Nama lengkap"
                           class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kota Asal</label>
                    <input type="text" th:field="*{kotaAsal}" required placeholder="Contoh: Surabaya"
                           class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Kunjungan</label>
                    <input type="date" th:field="*{tanggalKunjungan}" required
                           class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jumlah Orang</label>
                    <input type="number" th:field="*{jumlahOrang}" required min="1" max="100"
                           class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <button type="submit"
                        class="w-full bg-green-700 text-white py-3.5 rounded-xl font-bold hover:bg-green-800 transition shadow-md shadow-green-700/20">
                    Catat Kehadiran
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">
            <a href="/" class="text-green-700 hover:underline">Kembali ke halaman utama</a>
        </p>
    </main>
</body>
</html>
