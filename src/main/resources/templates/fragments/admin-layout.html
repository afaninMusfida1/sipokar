<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="layout(title, content)">
    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title} + ' | Admin Pokdarwis'">Admin</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 text-gray-800 font-sans">
        <div class="flex min-h-screen">
<aside class="sticky top-0 h-screen w-64 shrink-0 bg-green-900 text-white flex flex-col">
    <div class="p-6 text-xl font-bold border-b border-green-800 shrink-0">
        Sipokar Admin
    </div>
                </div>
                <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                    <a th:href="@{/admin/dashboard}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Dashboard</a>
                    <a th:href="@{/admin/konten}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Kelola Konten</a>
                    <a th:href="@{/admin/galeri}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Galeri Foto</a>
                    <a th:href="@{/admin/fasilitas}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Fasilitas</a>
                    <a th:href="@{/admin/pengunjung}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Data Pengunjung</a>
                    <a th:href="@{/admin/umkm}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Kelola UMKM</a>
                    <a th:href="@{/admin/feedback}" class="block px-4 py-2 rounded-lg hover:bg-green-800 transition">Cek Feedback</a>
                </nav>
                <form th:action="@{/logout}" method="post" class="p-4 border-t border-green-800 shrink-0">
                    <button type="submit" class="w-full text-left px-4 py-2 rounded-lg bg-red-700 hover:bg-red-800 transition font-medium">
                        Logout
                    </button>
                </form>
            </aside>
            <main class="flex-1 min-w-0 p-8">
                <h1 class="text-2xl font-bold mb-6 text-gray-900" th:text="${title}">Title</h1>
                <div th:replace="${content}"></div>
            </main>
        </div>
    </body>
    </html>
</div>
</body>
</html>
