<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <aside
      th:fragment="admin-sidebar"
      class="w-72 bg-[#0f3d2e] text-white h-screen flex flex-col fixed top-0 left-0 overflow-hidden z-40"
    >
      <!-- Decorative background -->
      <div
        class="absolute inset-0 bg-gradient-to-b from-[#14532d]/50 to-transparent pointer-events-none"
      ></div>

      <div
        class="absolute top-0 right-0 w-64 h-64 bg-amber-500/5 rounded-full -mr-32 -mt-32"
      ></div>

      <div class="relative z-10 p-6 flex-1 flex flex-col overflow-y-auto">
        <!-- Logo -->
        <div class="flex flex-col items-center text-center gap-2 mb-10 px-2">
          <img
            src="/images/logoSipokar.png"
            alt="Sipokar Logo"
            class="w-20 h-20 object-contain"
          />

          <div>
            <h2 class="text-lg font-bold tracking-tight text-white">
              Portal Admin
            </h2>
            <p class="text-xs text-amber-300/70">Sipokar Management</p>
          </div>
        </div>

        <!-- Menu -->
        <nav class="space-y-1 flex-1">
          <p
            class="px-4 text-xs font-semibold text-green-300 uppercase tracking-wider mb-2"
          >
            Menu Utama
          </p>

          <!-- Dashboard -->
          <a
            th:href="@{/admin/dashboard}"
            th:classappend="${#execInfo.templateName == 'admin/dashboard'} ? 'bg-amber-600/20 text-white border border-amber-500/30 shadow-lg shadow-orange-900/20 active' : 'text-gray-300 hover:text-white hover:bg-white/5'"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
            </svg>
            <span class="font-medium">Dashboard</span>
          </a>

          <!-- Konten -->
          <a
            th:href="@{/admin/konten}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
              />
            </svg>
            <span class="font-medium">Kelola Konten</span>
          </a>

          <!-- Galeri -->
          <a
            th:href="@{/admin/galeri}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5zm4 10l2.5-3 2 2.5L15 10l4 5H7z"
              />
            </svg>
            <span class="font-medium">Galeri Foto</span>
          </a>

          <!-- Fasilitas -->
          <a
            th:href="@{/admin/fasilitas}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"
              />
            </svg>
            <span class="font-medium">Fasilitas</span>
          </a>

          <!-- Reservasi -->
          <a
            th:href="@{/admin/reservasi}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 7h18M4 11h16M6 15h12M8 19h8"
              />
            </svg>
            <span class="font-medium">Reservasi</span>
          </a>

          <p
            class="px-4 text-xs font-semibold text-green-300 uppercase tracking-wider mt-6 mb-2"
          >
            Data & Laporan
          </p>

          <!-- Pengunjung -->
          <a
            th:href="@{/admin/pengunjung}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17 20h5V4H2v16h5m10 0v-4a2 2 0 00-4 0v4m4 0H9"
              />
            </svg>
            <span class="font-medium">Data Pengunjung</span>
          </a>

          <!-- UMKM -->
          <a
            th:href="@{/admin/umkm}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 21h18M5 21V7l7-4 7 4v14"
              />
            </svg>
            <span class="font-medium">Kelola UMKM</span>
          </a>

          <!-- Feedback -->
          <a
            th:href="@{/admin/feedback}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5l-2 2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
              />
            </svg>
            <span class="font-medium">Cek Feedback</span>
          </a>

          <!-- Calendar -->
          <a
            th:href="@{/admin/calendar}"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M8 2v4m8-4v4M3 10h18M5 6h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"
              />
            </svg>
            <span class="font-medium">Calendar Management</span>
          </a>
        </nav>
      </div>

      <!-- Logout -->
      <div class="relative z-10 p-4">
        <form th:action="@{/logout}" method="post" class="m-0">
          <button
            type="submit"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-500/10 text-red-300 hover:bg-red-500/20 hover:text-red-200 transition-all duration-200 border border-red-500/20"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            <span class="font-medium">Logout</span>
          </button>
        </form>
      </div>
    </aside>
  </body>
</html>
