<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:fragment="layout(title, activeMenu, content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' | Portal UMKM Sipokar'">UMKM</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .gradient-green {
        background: linear-gradient(180deg, #0f5132 0%, #14532d 100%);
      }

      .menu-active {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        font-weight: 600;
      }

      .sidebar-item {
        position: relative;
        overflow: hidden;
      }

      .sidebar-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: #34d399;
        transform: scaleY(0);
        transition: transform 0.3s ease;
      }

      .sidebar-item:hover::before,
      .sidebar-item.active::before {
        transform: scaleY(1);
      }
    </style>
  </head>

  <body class="bg-gray-50 text-gray-900 antialiased">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside
        class="w-72 shrink-0 gradient-green text-white flex flex-col justify-between shadow-xl"
      >
        <div>
          <!-- Logo -->
          <div class="px-8 py-10">
            <img src="/images/logo.png" class="w-20 mb-6" alt="Logo" />

            <h2 class="text-3xl font-bold leading-tight">Portal UMKM</h2>

            <p class="text-green-200 mt-2 text-sm">Mitra Partner</p>
          </div>

          <!-- Menu -->
          <nav class="px-6 space-y-3">
            <a
              th:href="@{/umkm/dashboard}"
              th:classappend="${activeMenu == 'dashboard'} ? 'menu-active'"
              class="flex items-center gap-4 px-4 py-4 rounded-2xl transition-all"
            >
              <i class="fas fa-chart-line"></i>
              Dashboard
            </a>

            <a
              th:href="@{/umkm/keuangan}"
              th:classappend="${activeMenu == 'keuangan'} ? 'menu-active'"
              class="flex items-center gap-4 px-4 py-4 rounded-2xl transition-all"
            >
              <i class="fas fa-wallet"></i>
              Catat Keuangan
            </a>

            <a
              th:href="@{/umkm/produk}"
              th:classappend="${activeMenu == 'produk'} ? 'menu-active'"
              class="flex items-center gap-4 px-4 py-4 rounded-2xl transition-all"
            >
              <i class="fas fa-box-open"></i>
              Kelola Produk
            </a>
          </nav>
        </div>

        <!-- Logout -->
        <div class="p-6">
          <form th:action="@{/logout}" method="post">
            <button
              type="submit"
              class="w-full bg-white/10 hover:bg-red-500 transition-all px-4 py-4 rounded-2xl flex items-center justify-center gap-3 font-semibold"
            >
              <i class="fas fa-sign-out-alt"></i>
              Logout
            </button>
          </form>
        </div>
      </aside>

      <!-- Content -->
      <main class="flex-1 overflow-y-auto">
        <div class="p-8 max-w-7xl mx-auto">
          <div th:replace="${content}"></div>
        </div>
      </main>
    </div>
  </body>
</html>
