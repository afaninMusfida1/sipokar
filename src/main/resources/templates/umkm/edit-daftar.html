<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisi Data UMKM - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-100 max-w-2xl w-full">
        <h1 class="text-2xl font-bold mb-2 text-blue-900"><i class="fas fa-edit"></i> Revisi Berkas & Data UMKM</h1>
        
        <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl text-sm mb-6">
            <strong class="text-blue-800"><i class="fas fa-comment-dots"></i> Pesan dari Admin:</strong>
            <p class="mt-1 text-gray-700 italic" th:text="${umkm.catatanReview}">Tolong perbaiki berkas...</p>
        </div>

        <form th:action="@{/umkm/edit-daftar}" th:object="${umkm}" method="post" enctype="multipart/form-data" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" />

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Usaha</label>
                <input type="text" th:field="*{namaUsaha}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Jenis Usaha</label>
                <input type="text" th:field="*{jenisUsaha}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pemilik</label>
                    <input type="text" th:field="*{pemilik}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">No. Telepon</label>
                    <input type="text" th:field="*{telepon}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap</label>
                <textarea th:field="*{alamat}" rows="2" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300">
                <label class="block text-sm font-bold text-gray-700 mb-1">Upload Ulang Berkas Pendukung</label>
                <p class="text-xs text-gray-500 mb-3">Upload PDF baru jika diminta admin. Jika tidak ada perubahan berkas, biarkan kosong.</p>
                <input type="file" name="fileBerkas" accept=".pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition">
                <i class="fas fa-paper-plane"></i> Kirim Ulang Pendaftaran
            </button>
        </form>

        <div class="mt-4 text-center">
            <a th:href="@{/umkm/dashboard}" class="text-sm text-gray-500 hover:text-gray-700 underline">Batal & Kembali ke Dashboard</a>
        </div>
    </div>

</body>
</html>
