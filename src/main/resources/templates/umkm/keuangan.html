<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Catatan Keuangan</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .sidebar-item {
        position: relative;
        overflow: hidden;
      }

      .sidebar-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: #34d399;
        transform: scaleY(0);
        transition: transform 0.3s ease;
      }

      .sidebar-item:hover::before,
      .sidebar-item.active::before {
        transform: scaleY(1);
      }

      .gradient-green {
        background: linear-gradient(135deg, #10b981, #059669, #047857);
      }

      .gradient-red {
        background: linear-gradient(135deg, #ef4444, #dc2626);
      }

      .gradient-blue {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
      }

      .badge-pulse {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.7; }
}
    </style>
  </head>

  <body class="bg-gray-50 min-h-screen flex">
    <!-- Sidebar -->
<aside
  class="w-72 bg-[#0f3d2e] text-white h-screen flex flex-col hidden md:flex fixed top-0 left-0 overflow-hidden z-40"
>
  <!-- Decorative background -->
  <div
    class="absolute inset-0 bg-gradient-to-b from-[#14532d]/50 to-transparent pointer-events-none"
  ></div>

  <div
    class="absolute top-0 right-0 w-64 h-64 bg-amber-500/5 rounded-full -mr-32 -mt-32"
  ></div>

  <div class="relative z-10 p-6 flex-1 flex flex-col overflow-y-auto">
    <!-- Logo -->
    <div class="flex flex-col items-center text-center gap-2 mb-10 px-2">
      <img
        src="/images/logoSipokar.png"
        alt="Sipokar Logo"
        class="w-20 h-20 object-contain"
      />

      <div>
        <h2 class="text-lg font-bold tracking-tight text-white">
          Portal UMKM
        </h2>
        <p class="text-xs text-amber-300/70">Mitra Partner</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="space-y-1 flex-1">
      <!-- Dashboard -->
      <a
        href="/umkm/dashboard"
        class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200 group"
      >
        <i
          class="fas fa-chart-line w-5 text-center group-hover:text-amber-400 transition-colors"
        ></i>
        <span class="font-medium">Dashboard</span>
      </a>

      <!-- Catat Keuangan ACTIVE -->
      <a
        href="/umkm/keuangan"
        class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-600/20 text-white border border-amber-500/30 shadow-lg shadow-orange-900/20"
      >
        <i class="fas fa-wallet w-5 text-center text-amber-400"></i>
        <span class="font-medium">Catat Keuangan</span>
        <span
          class="ml-auto w-2 h-2 rounded-full bg-amber-400 badge-pulse"
        ></span>
      </a>

      <!-- Produk -->
      <a
        href="/umkm/produk"
        class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-200 group"
      >
        <i
          class="fas fa-box-open w-5 text-center group-hover:text-amber-400 transition-colors"
        ></i>
        <span class="font-medium">Kelola Produk</span>
      </a>
    </nav>
  </div>

  <!-- Logout -->
  <div class="relative z-10 p-4">
    <form th:action="@{/logout}" method="post" class="m-0">
      <input
        type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}"
      />

      <button
        type="submit"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-500/10 text-red-300 hover:bg-red-500/20 hover:text-red-200 transition-all duration-200 border border-red-500/20 cursor-pointer"
      >
        <i class="fas fa-sign-out-alt w-5 text-center"></i>
        <span class="font-medium">Logout</span>
      </button>
    </form>
  </div>
</aside>
    <!-- MAIN -->
    <main class="flex-1 ml-72 px-12 py-8 w-[calc(100%-18rem)]">
      <!-- Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <span
            class="text-xs font-semibold text-green-600 bg-green-100 px-3 py-1 rounded-full uppercase"
          >
            Keuangan
          </span>

          <h1 class="text-4xl font-bold mt-3">Catatan Keuangan</h1>

          <p class="text-gray-500 mt-2">
            Kelola pemasukan dan pengeluaran usaha Anda
          </p>
        </div>

        <div class="flex gap-3">
          <input
            type="month"
            name="bulan"
            th:value="${bulan}"
            onchange="changeMonth(this.value)"
            class="border rounded-2xl px-4 py-3 shadow-sm"
          />

          <a
            th:href="@{/umkm/keuangan/export(bulan=${bulan})}"
            class="bg-green-600 text-white px-5 py-3 rounded-2xl font-semibold"
          >
            <i class="fas fa-download mr-2"></i>
            Export
          </a>
        </div>
      </div>

      <!-- Summary -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

  <!-- Total Pemasukan -->
  <div class="glass-card rounded-3xl p-6 shadow-lg border border-gray-100/50 relative overflow-hidden group">
    <div class="absolute top-0 right-0 w-40 h-40 bg-green-100/50 rounded-full -mr-10 -mt-10"></div>

    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 rounded-2xl gradient-green flex items-center justify-center shadow-lg shadow-green-500/30">
          <i class="fas fa-arrow-trend-up text-white text-lg"></i>
        </div>
      </div>

      <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">
        Total Pemasukan
      </p>

      <p class="text-3xl font-bold text-gray-900 mt-2"
         th:text="'Rp ' + ${#numbers.formatDecimal(totalPemasukan,0,'POINT',0,'COMMA')}">
      </p>

      <div class="mt-4 h-1 bg-gray-100 rounded-full overflow-hidden">
        <div class="h-full bg-green-500 rounded-full" style="width:75%"></div>
      </div>
    </div>
  </div>

  <!-- Total Pengeluaran -->
  <div class="glass-card rounded-3xl p-6 shadow-lg border border-gray-100/50 relative overflow-hidden group">
    <div class="absolute top-0 right-0 w-40 h-40 bg-red-100/50 rounded-full -mr-10 -mt-10"></div>

    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 rounded-2xl gradient-red flex items-center justify-center shadow-lg shadow-red-500/30">
          <i class="fas fa-arrow-trend-down text-white text-lg"></i>
        </div>
      </div>

      <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">
        Total Pengeluaran
      </p>

      <p class="text-3xl font-bold text-gray-900 mt-2"
         th:text="'Rp ' + ${#numbers.formatDecimal(totalPengeluaran,0,'POINT',0,'COMMA')}">
      </p>

      <div class="mt-4 h-1 bg-gray-100 rounded-full overflow-hidden">
        <div class="h-full bg-red-500 rounded-full" style="width:45%"></div>
      </div>
    </div>
  </div>

  <!-- Saldo -->
  <div class="glass-card rounded-3xl p-6 shadow-lg border border-gray-100/50 relative overflow-hidden group">
    <div class="absolute top-0 right-0 w-40 h-40 bg-blue-100/50 rounded-full -mr-10 -mt-10"></div>

    <div class="relative z-10">
      <div class="flex items-center justify-between mb-4">
        <div class="w-12 h-12 rounded-2xl gradient-blue flex items-center justify-center shadow-lg shadow-blue-500/30">
          <i class="fas fa-wallet text-white text-lg"></i>
        </div>
      </div>

      <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">
        Saldo
      </p>

      <p class="text-3xl font-bold text-gray-900 mt-2"
         th:text="'Rp ' + ${#numbers.formatDecimal(saldo,0,'POINT',0,'COMMA')}">
      </p>

      <div class="mt-4 h-1 bg-gray-100 rounded-full overflow-hidden">
        <div class="h-full bg-blue-500 rounded-full" style="width:90%"></div>
      </div>
    </div>
  </div>

</div>
      </div>

      <!-- Form Tambah -->
      <div class="glass-card rounded-3xl p-6 shadow-lg mb-8">
        <h3 class="text-xl font-bold mb-5">Tambah Transaksi</h3>

        <form
          th:action="@{/umkm/keuangan/transaksi}"
          method="post"
          class="grid md:grid-cols-5 gap-4"
        >
          <input
            type="date"
            name="tanggal"
            required
            class="border rounded-xl px-4 py-3"
          />
          <input
            type="text"
            name="keterangan"
            required
            placeholder="Keterangan"
            class="border rounded-xl px-4 py-3"
          />

          <select name="tipe" required class="border rounded-xl px-4 py-3">
            <option value="PEMASUKAN">Pemasukan</option>
            <option value="PENGELUARAN">Pengeluaran</option>
          </select>

          <input
            type="number"
            name="nominal"
            required
            placeholder="Nominal"
            class="border rounded-xl px-4 py-3"
          />

          <button
            type="submit"
            class="bg-green-600 text-white rounded-xl font-semibold"
          >
            Simpan
          </button>
        </form>
      </div>

      <!-- Riwayat -->
      <div class="glass-card rounded-3xl shadow-lg overflow-hidden">
        <div class="px-6 py-4 border-b">
          <h3 class="text-xl font-bold">Riwayat Transaksi</h3>
        </div>

        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-4 text-left">Tanggal</th>
              <th class="px-6 py-4 text-left">Keterangan</th>
              <th class="px-6 py-4 text-left">Kategori</th>
              <th class="px-6 py-4 text-left">Nominal</th>
              <th class="px-6 py-4 text-center">Aksi</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="item : ${transaksi}" class="border-t">
              <td class="px-6 py-4" th:text="${item.tanggal}"></td>
              <td class="px-6 py-4" th:text="${item.keterangan}"></td>

              <td class="px-6 py-4">
                <span
                  class="px-3 py-1 rounded-full bg-gray-100"
                  th:text="${item.tipe}"
                ></span>
              </td>

              <td
                class="px-6 py-4 font-semibold"
                th:text="'Rp ' + ${#numbers.formatDecimal(item.nominal,0,'POINT',0,'COMMA')}"
              ></td>

              <td class="px-6 py-4 text-center">
                <button
                  type="button"
                  th:attr="
      data-id=${item.id},
      data-tanggal=${item.tanggal},
      data-keterangan=${item.keterangan},
      data-tipe=${item.tipe},
      data-nominal=${item.nominal}"
                  onclick="openEditModal(this)"
                  class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center mx-auto hover:bg-blue-100 transition"
                >
                  <i class="fas fa-pen"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- POPUP EDIT -->
      <div
        id="editModal"
        class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"
      >
        <div class="bg-white w-full max-w-lg rounded-3xl p-8 shadow-xl">
          <h2 class="text-2xl font-bold mb-6">Edit Transaksi</h2>

          <form id="editForm" method="post" class="space-y-4">
            <input
              id="editTanggal"
              type="date"
              name="tanggal"
              class="w-full border rounded-xl px-4 py-3"
              required
            />

            <input
              id="editKeterangan"
              type="text"
              name="keterangan"
              class="w-full border rounded-xl px-4 py-3"
              required
            />

            <select
              id="editTipe"
              name="tipe"
              class="w-full border rounded-xl px-4 py-3"
            >
              <option value="PEMASUKAN">Pemasukan</option>
              <option value="PENGELUARAN">Pengeluaran</option>
            </select>

            <input
              id="editNominal"
              type="number"
              name="nominal"
              class="w-full border rounded-xl px-4 py-3"
              required
            />

            <div class="flex gap-3">
              <button
                type="submit"
                class="flex-1 bg-green-600 text-white py-3 rounded-xl"
              >
                Update
              </button>

              <button
                type="button"
                onclick="closeEditModal()"
                class="flex-1 bg-gray-200 py-3 rounded-xl"
              >
                Batal
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script>
      function changeMonth(bulan) {
        window.location.href = "/umkm/keuangan?bulan=" + bulan;
      }

      function openEditModal(button) {
        const id = button.dataset.id;
        const tanggal = button.dataset.tanggal;
        const keterangan = button.dataset.keterangan;
        const tipe = button.dataset.tipe;
        const nominal = button.dataset.nominal;

        document.getElementById("editForm").action =
          "/umkm/keuangan/edit/" + id;

        document.getElementById("editTanggal").value = tanggal;
        document.getElementById("editKeterangan").value = keterangan;
        document.getElementById("editTipe").value = tipe;
        document.getElementById("editNominal").value = nominal;

        document.getElementById("editModal").classList.remove("hidden");
        document.getElementById("editModal").classList.add("flex");
      }

      function closeEditModal() {
        document.getElementById("editModal").classList.add("hidden");
        document.getElementById("editModal").classList.remove("flex");
      }
    </script>
  </body>
</html>
