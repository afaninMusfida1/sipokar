<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Dashboard</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Dashboard Statistik', ~{::section})}">
    <section>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Total UMKM Terdaftar</p>
                <p class="text-3xl font-bold text-green-700 mt-2" th:text="${totalUmkm}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">UMKM Terverifikasi</p>
                <p class="text-3xl font-bold text-green-700 mt-2" th:text="${umkmTerdaftar}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">UMKM Menunggu Verifikasi</p>
                <p class="text-3xl font-bold text-yellow-600 mt-2" th:text="${umkmPending}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Total Feedback Masuk</p>
                <p class="text-3xl font-bold text-green-700 mt-2" th:text="${totalFeedback}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-500">Feedback Belum Ditindaklanjuti</p>
                <p class="text-3xl font-bold text-red-600 mt-2" th:text="${feedbackBelumDitindaklanjuti}">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <p class="text-sm text-gray-500">Total Kunjungan Website</p>
        <p class="text-3xl font-bold text-green-700 mt-2" th:text="${totalKunjunganWebsite}">0</p>
    </div>
</div>

<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
    <h2 class="text-lg font-bold mb-4">Tren Pengunjung Fisik (30 hari terakhir)</h2>
    <canvas id="trenChart" height="100"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const labels = /*[[${trenLabels}]]*/ [];
    const values = /*[[${trenValues}]]*/ [];

    new Chart(document.getElementById('trenChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Jumlah Pengunjung',
                data: values,
                borderColor: 'rgb(21, 128, 61)',
                backgroundColor: 'rgba(21, 128, 61, 0.1)',
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
</script>
        </div>

    </section>
</div>
</body>
</html>
