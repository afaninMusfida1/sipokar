<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Kelola Fasilitas</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Kelola Fasilitas', ~{::section})}">
    <section>
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8 max-w-3xl">
            <h2 class="text-base font-semibold text-gray-900 mb-4">Tambah Fasilitas Baru</h2>
            <form th:action="@{/admin/fasilitas}" th:object="${fasilitas}" method="post" class="flex flex-col sm:flex-row gap-3">
                <input type="text" th:field="*{nama}" required placeholder="Nama fasilitas (Contoh: Musholla)" class="flex-1 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm">
                
                <select th:field="*{icon}" class="w-full sm:w-48 p-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none text-sm text-gray-600">
                    <option value="Umum">Umum</option>
                    <option value="Hiburan">Hiburan</option>
                    <option value="Kebersihan">Kebersihan</option>
                    <option value="Keamanan">Keamanan</option>
                </select>

                <button type="submit" class="bg-gray-900 text-white px-6 py-2 rounded-xl text-sm font-semibold hover:bg-green-600 transition-all">Tambah</button>
            </form>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <div th:each="f : ${daftarFasilitas}" class="group bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex flex-col justify-between hover:shadow-md transition-all duration-300 relative">
                
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] uppercase tracking-wider font-bold text-green-700 bg-green-50 px-2 py-1 rounded-md" th:text="${f.icon}">Kategori</span>
                    
                    <form th:action="@{/admin/fasilitas/{id}/hapus(id=${f.id})}" method="post" th:id="'deleteForm' + ${f.id}">
                        <button type="button" 
                                th:onclick="'confirmDelete(' + ${f.id} + ')'" 
                                class="inline-flex items-center gap-1.5 text-red-600 hover:text-red-700 transition-colors text-sm font-medium">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                            <span>Hapus</span>
                        </button>
                    </form>
                </div>

                <h3 class="text-sm font-semibold text-gray-900 mt-2" th:text="${f.nama}">Nama Fasilitas</h3>
            </div>

            <div th:if="${#lists.isEmpty(daftarFasilitas)}" class="col-span-full py-12 text-center border-2 border-dashed border-gray-200 rounded-2xl">
                <p class="text-gray-400 text-sm">Belum ada fasilitas yang ditambahkan.</p>
            </div>
        </div>
        <script>
    function confirmDelete(id) {
        Swal.fire({
            title: 'Hapus fasilitas?',
            text: "Data yang dihapus tidak dapat dikembalikan!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Ya, hapus!',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                // Submit form berdasarkan ID unik
                document.getElementById('deleteForm' + id).submit();
            }
        });
    }
</script>
    </section>
</div>
</body>
</html>
