<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Galeri Foto</title>
</head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Kelola Galeri Foto', ~{::section})}">
    <section>
        
        <div th:if="${param.success}" class="flex items-center gap-3 bg-green-50 border border-green-200 text-green-800 p-4 rounded-xl mb-6 shadow-sm">
            <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-sm font-medium">Aksi berhasil dilakukan.</span>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="text-xl font-bold text-gray-900">Daftar Foto Galeri</h2>
                <p class="text-sm text-gray-500 mt-1">Tmbahkan foto yang akan tampil di halaman depan.</p>
            </div>
            
            <button onclick="openModal()" class="inline-flex items-center gap-2 bg-gray-900 text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow-md hover:bg-green-600 hover:shadow-green-500/25 transition-all duration-300 whitespace-nowrap">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Tambah Foto
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            
            <div th:each="f : ${daftarFoto}" class="group bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col hover:shadow-md transition-all duration-300">
    
    <div class="relative aspect-[4/3] overflow-hidden bg-gray-100 border-b border-gray-100">
        <img th:src="${f.url}" class="w-full h-full object-cover transform transition-transform duration-500 group-hover:scale-105" alt="Foto Galeri" />
    </div>

    <div class="p-5 flex flex-col flex-1">
        <p class="font-medium text-gray-900 text-sm line-clamp-2 mb-4" th:text="${f.keterangan}">Keterangan foto</p>
        
        <div class="mt-auto pt-4 border-t border-gray-100 flex justify-end">
            <form th:action="@{/admin/galeri/{id}/hapus(id=${f.id})}" method="post" onsubmit="return confirm('Hapus foto ini?');">
                <button type="submit" class="flex items-center gap-1.5 text-red-600 hover:text-red-700 text-sm font-medium transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Hapus
                </button>
            </form>
        </div>
    </div>
</div>

            <div th:if="${#lists.isEmpty(daftarFoto)}" class="col-span-full bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 p-12 flex flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mb-4 shadow-sm border border-gray-100">
                    <svg class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                </div>
                <h3 class="text-sm font-semibold text-gray-900 mb-1">Belum Ada Foto</h3>
                <p class="text-sm text-gray-500 max-w-sm">Galeri masih kosong. Klik tombol "Tambah Foto" di pojok kanan atas untuk mulai mengunggah.</p>
            </div>

        </div>

        <div id="modalTambah" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
            <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
            
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden scale-95 transition-transform duration-300" id="modalContent">
                
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
                    <h3 class="text-lg font-bold text-gray-900">Upload Foto Baru</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>

                <form th:action="@{/admin/galeri}" th:object="${foto}" method="post" enctype="multipart/form-data" class="p-6 space-y-5">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">File Foto</label>
                        <input type="file" name="gambar" accept="image/*" required
                               class="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 border border-gray-200 rounded-lg cursor-pointer focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Keterangan (Caption)</label>
                        <input type="text" th:field="*{keterangan}" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm text-gray-900 placeholder:text-gray-400" placeholder="Contoh: Gazebo utama" required />
                    </div>

                    <div class="pt-4 flex gap-3">
                        <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2.5 text-sm font-semibold text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">Batal</button>
                        <button type="submit" class="flex-1 px-4 py-2.5 text-sm font-semibold text-white bg-gray-900 rounded-xl hover:bg-green-600 transition-colors shadow-md">Simpan Foto</button>
                    </div>
                </form>
            </div>
        </div>

    </section>

    <script>
        const modal = document.getElementById('modalTambah');
        const modalContent = document.getElementById('modalContent');

        function openModal() {
            modal.classList.remove('hidden');
            // Sedikit delay agar animasi transisi terlihat
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            // Tunggu animasi selesai baru sembunyikan elemen
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
    </script>
</div>
</body>
</html>
