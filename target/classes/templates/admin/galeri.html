<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Galeri Foto</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Kelola Galeri Foto', ~{::section})}">
    <section>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 max-w-2xl">
            <h2 class="text-lg font-bold mb-4">Tambah Foto</h2>
            <form th:action="@{/admin/galeri}" th:object="${foto}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL Foto</label>
                    <input type="text" th:field="*{url}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="https://...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan</label>
                    <input type="text" th:field="*{keterangan}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Contoh: Gazebo utama">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Urutan Tampil</label>
                    <input type="number" th:field="*{urutan}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="0">
                </div>
                <button type="submit" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition">Tambah Foto</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div th:each="f : ${daftarFoto}" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <img th:src="${f.url}" class="w-full h-40 object-cover" alt="Foto">
                <div class="p-4">
                    <p class="font-medium text-sm" th:text="${f.keterangan}">Keterangan</p>
                    <p class="text-xs text-gray-400 mb-3">Urutan: <span th:text="${f.urutan}">0</span></p>
                    <form th:action="@{/admin/galeri/{id}/hapus(id=${f.id})}" method="post">
                        <button type="submit" class="text-red-600 text-sm hover:underline">Hapus</button>
                    </form>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(daftarFoto)}" class="text-gray-400 text-sm col-span-3 text-center py-6">
                Belum ada foto.
            </div>
        </div>
    </section>
</div>
</body>
</html>
