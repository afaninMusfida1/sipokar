<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Kelola Konten</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Kelola Konten Landing Page', ~{::section})}">
    <section>
        <div th:if="${param.success}" class="bg-green-100 border-l-4 border-green-600 text-green-800 p-4 rounded-lg mb-6 font-medium">
            Konten berhasil diperbarui.
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 max-w-3xl">
            <form th:action="@{/admin/konten}" th:object="${info}" method="post" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi Profil Wisata</label>
                    <textarea th:field="*{deskripsi}" rows="4" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Deskripsi Kebun Raya Mangrove Medokan Ayu..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Jam Buka</label>
                        <input type="text" th:field="*{jamBuka}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="08.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Jam Tutup</label>
                        <input type="text" th:field="*{jamTutup}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="17.00 WIB">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Harga Tiket</label>
                    <input type="text" th:field="*{hargaTiket}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Rp 5.000 / orang">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Info Parkir</label>
                    <textarea th:field="*{infoParkir}" rows="2" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Tersedia area parkir motor dan mobil"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kontak Pokdarwis</label>
                    <input type="text" th:field="*{kontak}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="0812-xxxx-xxxx">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL Foto Unggulan</label>
                    <input type="text" th:field="*{fotoUrl}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="https://...">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Link Google Maps</label>
                    <input type="text" th:field="*{mapsUrl}" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="https://maps.google.com/...">
                </div>

                <button type="submit" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition">
                    Simpan Perubahan
                </button>
            </form>
        </div>
    </section>
</div>
</body>
</html>
