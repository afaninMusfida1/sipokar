<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>QR Code Form Kunjungan</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('QR Code Form Kunjungan', ~{::section})}">
    <section>
        <div class="max-w-lg mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
                <h2 class="text-lg font-bold text-gray-900 mb-2">Scan untuk Check-in</h2>
                <p class="text-sm text-gray-500 mb-6">Pasang QR Code ini di pintu masuk agar pengunjung dapat mengisi form kunjungan.</p>

                <div class="inline-block p-4 bg-white border-2 border-gray-100 rounded-2xl mb-6">
                    <img th:src="@{/admin/pengunjung/qr/image}" alt="QR Code Data Pengunjung" class="w-64 h-64 mx-auto">
                </div>

                <div class="bg-gray-50 p-4 rounded-xl mb-6">
                    <p class="text-xs text-gray-500 mb-1">URL Form Kunjungan:</p>
                    <p class="text-sm font-mono text-green-800 break-all" th:text="${checkInUrl}">url</p>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <a th:href="@{/admin/pengunjung/qr/image}" download="qr-data-pengunjung.png"
                       class="inline-flex items-center justify-center gap-2 bg-green-700 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-green-800 transition">
                        Download QR Code
                    </a>
                    <a th:href="@{/admin/pengunjung}"
                       class="inline-flex items-center justify-center gap-2 border border-gray-200 text-gray-700 px-5 py-2.5 rounded-xl font-medium hover:bg-gray-50 transition">
                        Kembali ke Data Pengunjung
                    </a>
                </div>
            </div>

            <p class="text-xs text-gray-400 text-center mt-4">
                Tip: Cetak QR Code dan tempel di area masuk wisata. Pengunjung scan → isi form → data masuk dashboard admin.
            </p>
        </div>
    </section>
</div>
</body>
</html>
