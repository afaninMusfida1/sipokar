<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Data Pengunjung</title></head>
<body>
<div th:replace="~{fragments/admin-layout :: layout('Data Pengunjung Fisik', ~{::section})}">
    <section>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 max-w-md">
            <h2 class="text-lg font-bold mb-4">Input / Update Jumlah Pengunjung</h2>
            <form th:action="@{/admin/pengunjung}" th:object="${dataPengunjung}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                    <input type="date" th:field="*{tanggal}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jumlah Pengunjung</label>
                    <input type="number" th:field="*{jumlahPengunjung}" required min="0" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <button type="submit" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition">Simpan</button>
            </form>
            <p class="text-xs text-gray-400 mt-2">Jika tanggal sudah ada datanya, akan diperbarui.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                    <tr>
                        <th class="px-6 py-3">Tanggal</th>
                        <th class="px-6 py-3">Jumlah Pengunjung</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${riwayat}" class="border-t border-gray-100">
                        <td class="px-6 py-3" th:text="${#temporals.format(d.tanggal, 'dd MMM yyyy')}">tanggal</td>
                        <td class="px-6 py-3" th:text="${d.jumlahPengunjung}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(riwayat)}">
                        <td colspan="2" class="px-6 py-6 text-center text-gray-400">Belum ada data.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
