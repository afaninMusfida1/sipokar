<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu | Pokdarwis Medokan Ayu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Header with soft gradient & curve -->
    <header class="bg-gradient-to-b from-brand-800 to-brand-700 text-white pt-12 pb-24 px-4 text-center rounded-b-[2rem] shadow-md">
        <h1 class="text-3xl md:text-4xl font-heading font-bold tracking-tight">Selamat Datang</h1>
        <p class="text-brand-100 mt-2 text-sm md:text-base font-medium">Ekowisata Mangrove Medokan Ayu</p>
    </header>

    <!-- Main Form Area (Pulled up to overlap the header) -->
    <main class="max-w-md w-full mx-auto px-4 -mt-16 mb-auto">
        
        <!-- Success Message -->
        <div th:if="${param.success}" class="mb-6 bg-brand-50 border-l-4 border-brand-500 text-brand-800 p-4 rounded-r-xl flex items-start gap-3 shadow-sm">
            <svg class="w-5 h-5 mt-0.5 shrink-0 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div>
                <h3 class="font-bold font-heading text-sm">Berhasil!</h3>
                <p class="text-sm mt-1 text-brand-700">Data kunjungan Anda telah berhasil dicatat.</p>
            </div>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 md:p-8">
            <div class="text-center mb-6">
                <h2 class="text-xl font-heading font-bold text-slate-900">Buku Tamu Digital</h2>
                <p class="text-sm text-slate-500 mt-1">Pencatatan jumlah rombongan pengunjung</p>
            </div>

            <form th:action="@{/form-kunjungan}" th:object="${pengunjung}" method="post" class="space-y-5">
                
                <!-- Tanggal Kunjungan -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tanggal Kunjungan</label>
                    <input type="date" th:field="*{tanggalKunjungan}" required
                           class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-slate-700 cursor-pointer">
                </div>

                <!-- Kategori Pengunjung -->
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <label class="block text-sm font-semibold text-slate-700 mb-3 border-b border-slate-200 pb-2">Kategori Pengunjung</label>
                    
                    <div class="space-y-4">
                        <!-- Dewasa -->
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="block font-medium text-slate-800">Dewasa</span>
                                <span class="text-xs text-slate-500">Usia &gt; 12 tahun</span>
                            </div>
                            <div class="w-24">
                                <input type="number" th:field="*{jumlahDewasa}" required min="0" placeholder="0"
                                       class="w-full p-2.5 text-center bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none font-bold text-slate-800 transition-all">
                            </div>
                        </div>

                        <!-- Anak-anak -->
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="block font-medium text-slate-800">Anak-anak</span>
                                <span class="text-xs text-slate-500">Usia 3 - 12 tahun</span>
                            </div>
                            <div class="w-24">
                                <input type="number" th:field="*{jumlahAnak}" required min="0" placeholder="0"
                                       class="w-full p-2.5 text-center bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none font-bold text-slate-800 transition-all">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="w-full mt-2 bg-brand-600 text-white py-3.5 rounded-xl font-heading font-bold text-base hover:bg-brand-700 focus:ring-4 focus:ring-brand-200 transition-all shadow-lg shadow-brand-600/30 flex justify-center items-center gap-2">
                    <span>Catat Kehadiran</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-8 pb-8">
            <a href="/" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-brand-600 transition-colors gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali ke Halaman Utama
            </a>
        </div>
    </main>

</body>
</html>
