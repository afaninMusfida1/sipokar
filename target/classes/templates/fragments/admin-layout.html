<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' | Admin Sipokar'">Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-50 text-gray-900 antialiased selection:bg-green-200">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

      <!-- Main Content -->
      <main class="flex-1 min-w-0 h-screen overflow-y-auto">
        <header
          class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between sticky top-0 z-10"
        >
          <!-- Breadcrumb -->
          <div class="flex items-center gap-2 text-sm text-gray-500">
            <span>Admin</span>
            <span>/</span>
            <span class="font-medium text-gray-900" th:text="${title}">
              Dashboard
            </span>
          </div>

          <!-- Notification -->
          <div class="flex items-center gap-5">
            <a th:href="@{/admin/notifications}" class="relative group">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6 text-gray-500 group-hover:text-green-600 transition"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 
                     6.002 0 00-4-5.659V5a2 2 0 10-4 
                     0v.341C7.67 6.165 6 8.388 6 
                     11v3.159c0 .538-.214 1.055-.595 
                     1.436L4 17h5m6 0v1a3 3 0 
                     11-6 0v-1m6 0H9"
                />
              </svg>

              <span
                th:if="${unreadCount != null and unreadCount > 0}"
                th:text="${unreadCount}"
                class="absolute -top-2 -right-2 min-w-[20px] h-5 px-1 flex items-center justify-center bg-red-500 text-white text-[11px] font-semibold rounded-full shadow"
              >
              </span>
            </a>
          </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto">
          <h1
            class="text-3xl font-bold mb-8 text-gray-900 tracking-tight"
            th:text="${title}"
          >
            Title
          </h1>

          <div th:replace="${content}"></div>
        </div>
      </main>
    </div>
  </body>
</html>
