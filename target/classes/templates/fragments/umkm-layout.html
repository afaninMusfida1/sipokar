<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Portal UMKM Sipokar'">UMKM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased selection:bg-green-200">
    <div class="flex min-h-screen">

        <!-- Sidebar UMKM -->
        <aside class="sticky top-0 h-screen w-64 shrink-0 bg-gray-950 text-gray-300 flex flex-col border-r border-gray-800">
            <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
                <a href="#" class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-green-600 flex items-center justify-center text-white font-bold">S</div>
                    <span class="text-lg font-bold text-white tracking-tight">Portal UMKM</span>
                </a>
            </div>

            <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto [&::-webkit-scrollbar]:hidden">
                <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-4">Menu</p>

                <a th:href="@{/umkm/dashboard}"
                   th:classappend="${#execInfo.templateName == 'umkm/dashboard' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    Dashboard
                </a>

                <a th:href="@{/umkm/keuangan}"
                   th:classappend="${#execInfo.templateName == 'umkm/keuangan' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    Catat Keuangan
                </a>
            </nav>

            <form th:action="@{/logout}" method="post" class="p-4 border-t border-gray-800 shrink-0">
                <button type="submit" class="flex items-center justify-center gap-2 w-full px-4 py-2.5 rounded-lg text-gray-400 hover:bg-red-500/10 hover:text-red-500 transition-colors font-medium text-sm">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    Log out
                </button>
            </form>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-w-0 h-screen overflow-y-auto">
            <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between sticky top-0 z-10">
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span>UMKM</span>
                    <span>/</span>
                    <span class="font-medium text-gray-900" th:text="${title}">Dashboard</span>
                </div>
            </header>

            <div class="p-8 max-w-7xl mx-auto">
                <h1 class="text-3xl font-bold mb-8 text-gray-900 tracking-tight" th:text="${title}">Title</h1>
                <div th:replace="${content}"></div>
            </div>
        </main>

    </div>
</body>
