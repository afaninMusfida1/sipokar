<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun UMKM - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">

    <div class="h-screen flex">
        <div class="w-full md:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 bg-white relative z-10 shadow-xl md:shadow-none">
            <div class="w-full max-w-md space-y-8">

                <div class="text-center md:text-left">
                    <a href="/" class="block text-sm font-medium text-green-600 hover:text-green-800 transition mb-4">
                        &larr; Kembali ke Landing Page
                    </a>
                    <h2 class="text-3xl font-extrabold tracking-tight text-green-800">Daftar Akun UMKM</h2>
                    <p class="mt-2 text-sm text-gray-500">
                        Buat akun untuk mendaftar sebagai mitra UMKM kawasan ekowisata.
                    </p>
                </div>

                <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                    <p class="text-sm text-red-700 font-medium" th:text="${error}">Error</p>
                </div>

                <form th:action="@{/register}" method="post" class="mt-8 space-y-6">
                    <div class="space-y-5">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                            <input id="email" name="email" type="email" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm transition duration-200 outline-none"
                                placeholder="nama@email.com">
                        </div>
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                            <input id="username" name="username" type="text" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm transition duration-200 outline-none"
                                placeholder="Masukkan username">
                        </div>
                        
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <div class="relative">
                                <input id="password" name="password" type="password" required
                                    class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm transition duration-200 outline-none"
                                    placeholder="••••••••">
                                
                                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-green-600 transition-colors">
                                    <svg id="eyeIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    <svg id="eyeSlashIcon" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-green-700 hover:bg-green-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-600 transition duration-200">
                        Daftar Akun
                    </button>
                </form>

                <div class="text-center mt-6 space-y-2">
                    <p class="text-sm text-gray-500">
                        Sudah punya akun?
                        <a href="/login" class="font-medium text-green-600 hover:text-green-800 transition">Masuk di sini</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="hidden md:block md:w-1/2 relative bg-green-900">
            <div class="absolute inset-0 bg-green-900/60 mix-blend-multiply z-10"></div>
            <img class="absolute inset-0 h-full w-full object-cover"
                 src="https://images.unsplash.com/photo-1473448912268-2022ce9509d8?q=80&w=2041&auto=format&fit=crop"
                 alt="Pemandangan Hutan Mangrove">
            <div class="absolute bottom-12 left-12 z-20 text-white max-w-md pr-8">
                <h3 class="text-3xl font-bold mb-3 leading-tight">Jadi Mitra UMKM Kami</h3>
                <p class="text-green-100 text-lg">
                    Setelah akun terdaftar, lengkapi data usaha Anda dan tunggu verifikasi dari admin untuk mulai mencatat keuangan.
                </p>
            </div>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeSlashIcon = document.getElementById('eyeSlashIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('hidden');
            eyeSlashIcon.classList.toggle('hidden');
        });
    </script>
</body>
</html>
