<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-extrabold text-green-800 mb-2">Lupa Password?</h2>
                <p class="text-sm text-gray-500">
                    Masukkan alamat email yang terdaftar. Kami akan mengirimkan tautan untuk mengatur ulang password Anda.
                </p>
            </div>

            <!-- Pesan Sukses (dummy action) -->
            <div th:if="${param.success}" class="bg-green-50 border-l-4 border-green-500 p-4 rounded-md mb-6">
                <p class="text-sm text-green-700 font-medium">Tautan reset password telah dikirim ke email Anda.</p>
            </div>

            <form th:action="@{/reset-password}" method="post" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                    <input id="email" name="email" type="email" required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm transition duration-200 outline-none" 
                        placeholder="nama@email.com">
                </div>

                <button type="submit" 
                    class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-green-700 hover:bg-green-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-600 transition duration-200">
                    Kirim Tautan Reset
                </button>
            </form>
            
            <div class="text-center mt-6">
                <a href="/login" class="text-sm font-medium text-green-600 hover:text-green-800 transition flex items-center justify-center gap-1">
                    &larr; Kembali ke halaman Login
                </a>
            </div>
            
        </div>
    </div>

</body>
</html>
