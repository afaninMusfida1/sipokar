<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar UMKM - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-6"
  >
    <div
      class="bg-white p-8 rounded-2xl shadow-md border border-gray-100 max-w-2xl w-full"
    >
      <h1 class="text-2xl font-bold mb-2 text-gray-900">
        Daftar sebagai Mitra UMKM
      </h1>
      <p class="text-sm text-gray-500 mb-6">
        Lengkapi data usaha Anda. Proses review dokumen memakan waktu estimasi
        <strong>1-3 hari kerja</strong>.
      </p>

      <div th:if="${error}" class="alert alert-danger" role="alert">
        <span th:text="${error}"></span>
      </div>

      <form
        id="umkmForm"
        th:action="@{/umkm/daftar}"
        th:object="${umkm}"
        method="post"
        enctype="multipart/form-data"
        class="space-y-5"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Nama Usaha</label
          >
          <input
            type="text"
            th:field="*{namaUsaha}"
            required
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Contoh: Warung Mangrove Asri"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Jenis Usaha</label
          >
          <input
            type="text"
            th:field="*{jenisUsaha}"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Contoh: Kuliner, Kerajinan, Sewa Perahu"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Nama Pemilik</label
            >
            <input
              type="text"
              th:field="*{pemilik}"
              required
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
              placeholder="Nama lengkap"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >No. Telepon</label
            >
            <input
              type="text"
              th:field="*{telepon}"
              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
              placeholder="08xxxxxxxxxx"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Alamat Lengkap</label
          >
          <textarea
            th:field="*{alamat}"
            rows="2"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
            placeholder="Alamat detail usaha"
          ></textarea>
        </div>

        <div
          class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300"
        >
          <label class="block text-sm font-bold text-gray-700 mb-1"
            >Upload Berkas Pendukung (Wajib)</label
          >
          <p class="text-xs text-gray-500 mb-3">
            Satukan scan KTP, NIB, atau Proposal Usaha dalam 1 file PDF (Maks.
            5MB).
          </p>

          <input
            id="fileBerkas"
            type="file"
            name="fileBerkas"
            accept=".pdf"
            required
            class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-green-700 text-white p-3 rounded-xl font-bold hover:bg-green-800 transition"
        >
          Kirim Pendaftaran
        </button>
      </form>

      <form th:action="@{/logout}" method="post" class="mt-4 text-center">
        <button
          type="submit"
          class="text-sm text-gray-500 hover:text-gray-700 underline"
        >
          Batalkan & Logout
        </button>
      </form>
    </div>

    <script>
      document
        .getElementById("umkmForm")
        .addEventListener("submit", function (e) {
          const fileInput = document.getElementById("fileBerkas");
          const file = fileInput.files[0];

          if (!file) {
            alert("File proposal wajib diupload");
            e.preventDefault();
            return;
          }

          const maxSize = 5 * 1024 * 1024; // 5MB

          if (file.size > maxSize) {
            alert("Ukuran file maksimal 5MB");
            e.preventDefault();
            return;
          }

          if (file.type !== "application/pdf") {
            alert("File harus berformat PDF");
            e.preventDefault();
            return;
          }
        });
    </script>
  </body>
</html>
