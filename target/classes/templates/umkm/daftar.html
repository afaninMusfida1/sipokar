<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Mitra UMKM - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased flex h-screen overflow-hidden selection:bg-green-200">

    <div class="hidden lg:flex lg:w-5/12 h-full bg-gray-950 text-white relative flex-col justify-between p-10 border-r border-gray-800">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#22c55e_1px,transparent_1px)] [background-size:20px_20px]"></div>
        
        <div class="relative z-10">
            <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center text-white font-bold text-xl mb-8 shadow-lg shadow-green-900/20">
                S
            </div>
            
            <h1 class="text-3xl lg:text-4xl font-bold tracking-tight leading-tight mb-4">
                Kembangkan Usaha<br>Anda Bersama Kami.
            </h1>
            <p class="text-gray-400 text-base leading-relaxed max-w-sm">
                Bergabunglah dengan ekosistem Portal UMKM Sipokar. Jangkau lebih banyak wisatawan dan kelola bisnis Anda dengan lebih mudah.
            </p>
        </div>

        <div class="relative z-10 text-xs text-gray-500 font-medium">
            &copy; 2026 Portal UMKM Sipokar.
        </div>
    </div>

    <div class="w-full lg:w-7/12 h-full flex flex-col justify-center px-6 py-6 sm:px-12 lg:px-20 bg-gray-50 lg:bg-white overflow-y-auto">
        <div class="w-full max-w-lg mx-auto">
            
            <div class="lg:hidden w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white font-bold text-xl mb-6 shadow-sm">
                S
            </div>

            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Pendaftaran Mitra</h2>
            <p class="text-sm text-gray-500 mt-1 mb-6">Lengkapi profil usaha Anda. Proses review 1-3 hari kerja.</p>

            <div th:if="${error}" class="flex items-center gap-3 bg-red-50 text-red-700 p-3 rounded-xl border border-red-100 mb-5 text-sm font-medium">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span th:text="${error}"></span>
            </div>

            <form id="umkmForm" th:action="@{/umkm/daftar}" th:object="${umkm}" method="post" enctype="multipart/form-data" class="space-y-4">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Nama Usaha</label>
                        <input type="text" th:field="*{namaUsaha}" required
                            class="w-full p-2.5 bg-gray-50 lg:bg-white border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm placeholder-gray-400"
                            placeholder="Warung Asri" />
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Jenis Usaha</label>
                        <input type="text" th:field="*{jenisUsaha}"
                            class="w-full p-2.5 bg-gray-50 lg:bg-white border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm placeholder-gray-400"
                            placeholder="Contoh: Kuliner" />
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">Nama Pemilik</label>
                        <input type="text" th:field="*{pemilik}" required
                            class="w-full p-2.5 bg-gray-50 lg:bg-white border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm placeholder-gray-400"
                            placeholder="Sesuai KTP" />
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">No. Telepon / WA</label>
                        <input type="text" th:field="*{telepon}"
                            class="w-full p-2.5 bg-gray-50 lg:bg-white border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm placeholder-gray-400"
                            placeholder="08xxxxxxxxxx" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Alamat Lengkap</label>
                    <textarea th:field="*{alamat}" rows="2"
                        class="w-full p-2.5 bg-gray-50 lg:bg-white border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all outline-none text-sm placeholder-gray-400 resize-none"
                        placeholder="Alamat detail operasional usaha"></textarea>
                </div>

                <div class="pt-1">
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">Berkas Pendukung <span class="text-red-500">*</span></label>
                    <label for="fileBerkas" id="dropzoneLabel" class="flex flex-col items-center justify-center w-full h-24 border-2 border-gray-200 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 hover:border-green-400 transition-all group">
                        <div class="flex flex-col items-center justify-center pt-4 pb-4 text-center">
                            <svg class="w-5 h-5 text-green-600 mb-1 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p class="mb-0.5 text-xs text-gray-600"><span class="font-semibold text-green-600">Pilih file PDF</span> atau tarik ke sini</p>
                            <p id="fileNameDisplay" class="mt-1 text-xs font-bold text-green-700 hidden"></p>
                        </div>
                        <input id="fileBerkas" type="file" name="fileBerkas" accept=".pdf" required class="hidden" />
                    </label>
                </div>

                <div class="pt-3">
                    <button type="submit"
                        class="w-full bg-gray-950 text-white p-3 rounded-lg text-sm font-semibold hover:bg-green-600 transition-colors shadow-sm">
                        Kirim Pendaftaran
                    </button>
                </div>
            </form>

            <form th:action="@{/logout}" method="post" class="mt-5 text-center">
                <button type="submit" class="text-xs font-medium text-gray-400 hover:text-gray-700 transition-colors">
                    &larr; Batalkan dan kembali
                </button>
            </form>

        </div>
    </div>

    <script>
        const form = document.getElementById("umkmForm");
        const fileInput = document.getElementById("fileBerkas");
        const fileNameDisplay = document.getElementById("fileNameDisplay");
        const dropzoneLabel = document.getElementById("dropzoneLabel");

        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileNameDisplay.textContent = '📄 ' + this.files[0].name;
                fileNameDisplay.classList.remove('hidden');
                dropzoneLabel.classList.add('border-green-400', 'bg-green-50/30');
            } else {
                fileNameDisplay.textContent = '';
                fileNameDisplay.classList.add('hidden');
                dropzoneLabel.classList.remove('border-green-400', 'bg-green-50/30');
            }
        });

        form.addEventListener("submit", function (e) {
            const file = fileInput.files[0];
            if (!file) { alert("File wajib diupload"); e.preventDefault(); return; }
            if (file.size > 5 * 1024 * 1024) { alert("Maksimal 5MB!"); e.preventDefault(); return; }
            if (file.type !== "application/pdf") { alert("Harus PDF!"); e.preventDefault(); return; }
        });
    </script>
</body>
</html>
