<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Password - Sipokar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md space-y-6">
        <h2 class="text-2xl font-bold text-green-800 text-center">Buat Password Baru</h2>

        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
            <p class="text-sm text-red-700" th:text="${error}"></p>
        </div>

        <form th:action="@{/update-password}" method="post" class="space-y-4">
            <input type="hidden" name="email" th:value="${email}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full py-3 bg-green-700 hover:bg-green-800 text-white font-bold rounded-xl transition">
                Simpan Password Baru
            </button>
        </form>

        <div class="text-center">
            <a href="/login" class="text-sm text-green-600 hover:text-green-800">← Kembali ke Login</a>
        </div>
    </div>
</body>
</html>
